          required: [tableCode, tableName, layer]
          properties:
            tableCode:
              type: string
              maxLength: 128
            tableName:
              type: string
              maxLength: 200
            layer:
              type: string
              maxLength: 32
            partitionStrategy:
              type: string
              maxLength: 1000
            tableComment:
              type: string
              maxLength: 1000

    UpdatePhysicalTableRequest:
      allOf:
        - $ref: '#/components/schemas/DraftVersion'
        - type: object
          properties:
            tableCode:
              type: string
              maxLength: 128
            tableName:
              type: string
              maxLength: 200
            layer:
              type: string
              maxLength: 32
            partitionStrategy:
              type: string
              maxLength: 1000
            tableComment:
              type: string
              maxLength: 1000

    CreatePhysicalFieldRequest:
      allOf:
        - $ref: '#/components/schemas/DraftVersion'
        - type: object
          required: [projectId, physicalTableId, fieldCode, fieldName, postgresType]
          properties:
            projectId:
              type: string
            physicalTableId:
              type: string
            fieldCode:
              type: string
            fieldName:
              type: string
            postgresType:
              type: string
              example: numeric(18,6)
            nullable:
              type: boolean
              default: true
            primaryKey:
              type: boolean
              default: false
            partitionKey:
              type: boolean
              default: false
            comment:
              type: string

    UpdatePhysicalFieldRequest:
      allOf:
        - $ref: '#/components/schemas/DraftVersion'
        - type: object
          properties:
            fieldCode:
              type: string
            fieldName:
              type: string
            postgresType:
              type: string
            nullable:
              type: boolean
            primaryKey:
              type: boolean
            partitionKey:
              type: boolean
            comment:
              type: string

    PhysicalField:
      type: object
      required: [physicalFieldId, physicalTableId, fieldCode, fieldName, postgresType, nullable, primaryKey, partitionKey]
      properties:
        physicalFieldId:
          type: string
        physicalTableId:
          type: string
        physicalTableName:
          type: string
        fieldCode:
          type: string
        fieldName:
          type: string
        postgresType:
          type: string
        nullable:
          type: boolean
        primaryKey:
          type: boolean
        partitionKey:
          type: boolean
        comment:
          type: string

    ImportJob:
      type: object
      required: [importId, projectId, status, createdAt]
      properties:
        importId:
          type: string
        projectId:
          type: string
        status:
          $ref: '#/components/schemas/ImportStatus'
        fileName:
          type: string
        createdBy:
          $ref: '#/components/schemas/UserRef'
        createdAt:
          type: string
          format: date-time
        parsedAt:
          type: string
          format: date-time
        appliedAt:
          type: string
          format: date-time
        cancelledAt:
          type: string
          format: date-time
        errors:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'

    ImportPreview:
      type: object
      required: [importId, projectId, status, tables, summary, errors, warnings, actions]
      properties:
        importId:
          type: string
        projectId:
          type: string
        status:
          $ref: '#/components/schemas/ImportStatus'
        summary:
          $ref: '#/components/schemas/ImportSummary'
        tables:
          type: array
          items:
            $ref: '#/components/schemas/ImportPreviewTable'
        errors:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'
        actions:
          type: array
          items:
            $ref: '#/components/schemas/ActionPermission'

    ImportSummary:
      type: object
      required: [tableCount, fieldCount, errorCount, warningCount]
      properties:
        tableCount:
          type: integer
          minimum: 0
        fieldCount:
          type: integer
          minimum: 0
        errorCount:
          type: integer
          minimum: 0
        warningCount:
          type: integer
          minimum: 0
        missingRequiredColumns:
          type: array
          items:
            type: string
        unsupportedColumns:
          type: array
          items:
            type: string

    ImportPreviewTable:
      type: object
      required: [sourceTableName, targetTableName, fields]
      properties:
        sourceTableName:
          type: string
        sourceTableComment:
          type: string
        targetTableName:
          type: string
        targetTableInScope:
          type: boolean
        fields:
          type: array
          items:
            $ref: '#/components/schemas/ImportPreviewField'

    ImportPreviewField:
      type: object
      required: [rowNo, sourceFieldName, sourceFieldType, standardColumns, targetPostgresType]
      properties:
        rowNo:
          type: integer
          minimum: 1
        sourceFieldName:
          type: string
        sourceFieldComment:
          type: string
        sourceFieldType:
          type: string
        standardColumns:
          type: object
          additionalProperties:
            type: string
        targetPostgresType:
          type: string
        typeConversionStatus:
          type: string
          enum: [converted, manual_required, unsupported]
        errors:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'

    ApplyImportRequest:
      allOf:
        - $ref: '#/components/schemas/DraftVersion'
        - type: object
          properties:
            continueWithWarnings:
              type: boolean
              default: false
            warningConfirmNote:
              type: string
              description: 当 continueWithWarnings=true 时记录人工继续说明。

    ImportApplyResult:
      type: object
      required: [importId, projectId, status, createdPhysicalTableCount, createdPhysicalFieldCount, draftVersion]
      properties:
        importId:
          type: string
        projectId:
          type: string
        status:
          $ref: '#/components/schemas/ImportStatus'
        createdPhysicalTableCount:
          type: integer
          minimum: 0
        createdPhysicalFieldCount:
          type: integer
          minimum: 0
        draftVersion:
          type: integer
          minimum: 0

    CancelImportRequest:
      type: object
      properties:
        reason:
          type: string
          maxLength: 500

    ExcelTemplateAliasList:
      type: object
      required: [templateVersion, aliases]
      properties:
        templateVersion:
          type: string
        aliases:
          type: array
          items:
            $ref: '#/components/schemas/ExcelTemplateAlias'

    ExcelTemplateAlias:
      type: object
      required: [standardColumn, aliases, required, mismatchBehavior]
      properties:
        standardColumn:
          type: string
          example: 源字段名
        aliases:
          type: array
          items:
            type: string
          example: [既有字段英文名, 代码]
        required:
          type: boolean
        mismatchBehavior:
          type: string
          enum: [block_import, warn_only]

    PageResult_FieldMappingRow:
      type: object
      required: [code, message, data, pageMeta]
      properties:
        code:
          type: string
          example: SUCCESS
        message:
          type: string
          example: 操作成功
        data:
          type: array
          items:
            $ref: '#/components/schemas/FieldMappingRow'
        pageMeta:
          $ref: '#/components/schemas/PageMeta'
        coverageSummary:
          $ref: '#/components/schemas/CoverageSummary'
        draftVersion:
          type: integer
          minimum: 0
        traceId:
          type: string
        timestamp:
          type: string
          format: date-time

    FieldMappingRow:
      type: object
      required: [mappingId, logicalField, mappingStatus, actions]
      properties:
        mappingId:
          type: string
        logicalField:
          $ref: '#/components/schemas/LogicalFieldRef'
        physicalField:
          $ref: '#/components/schemas/PhysicalFieldRef'
        mappingStatus:
          $ref: '#/components/schemas/MappingStatus'
        mappingNote:
          type: string
        issueSeverity:
          $ref: '#/components/schemas/IssueSeverity'
        issues:
          type: array
          items:
            $ref: '#/components/schemas/ValidationIssue'
        updatedAt:
          type: string
          format: date-time
        actions:
          type: array
          items:
            $ref: '#/components/schemas/ActionPermission'

    LogicalFieldRef:
      type: object
      required: [logicalFieldId, logicalEntityName, fieldCode, fieldName, p0Required]
      properties:
        logicalFieldId:
          type: string
        logicalEntityName:
          type: string
        fieldCode:
          type: string
        fieldName:
          type: string
        p0Required:
          type: boolean
        sensitiveFlag:
          type: boolean
        classificationStatus:
          $ref: '#/components/schemas/ClassificationStatus'

    PhysicalFieldRef:
      type: object
      required: [physicalFieldId, physicalTableName, fieldCode, fieldName, postgresType]
      properties:
        physicalFieldId:
          type: string
        physicalTableName:
          type: string
        fieldCode:
          type: string
        fieldName:
          type: string
        postgresType:
          type: string

    UpdateFieldMappingRequest:
      allOf:
        - $ref: '#/components/schemas/DraftVersion'
        - type: object
          required: [logicalFieldId]
          properties:
            logicalFieldId:
              type: string
            physicalFieldId:
              type: string
              description: 为空表示清除映射。
            mappingNote:
              type: string

    BatchSaveMappingsRequest:
      allOf:
        - $ref: '#/components/schemas/DraftVersion'
        - type: object
          required: [mappings]
          properties:
            mappings:
              type: array
              minItems: 1
              items:
                type: object
                required: [logicalFieldId]
                properties:
                  mappingId:
                    type: string
                  logicalFieldId:
                    type: string
                  physicalFieldId:
                    type: string
                  mappingNote:
                    type: string

    BatchSaveMappingsResult:
      type: object
      required: [savedCount, draftVersion, coverageSummary]
      properties:
        savedCount:
          type: integer
          minimum: 0
        draftVersion:
          type: integer
          minimum: 0
        coverageSummary:
          $ref: '#/components/schemas/CoverageSummary'
        fieldErrors:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'

    CoverageSummary:
      type: object
      required: [overallCoverage, p0Coverage, thresholds, missingFields, blockingIssueCount, warningIssueCount]
      properties:
        overallCoverage:
          $ref: '#/components/schemas/CoverageMetric'
        p0Coverage:
          $ref: '#/components/schemas/CoverageMetric'
        thresholds:
          $ref: '#/components/schemas/CoverageThresholds'
        missingFields:
          type: array
          items:
            $ref: '#/components/schemas/LogicalFieldRef'
        blockingIssueCount:
          type: integer
          minimum: 0
        warningIssueCount:
          type: integer
          minimum: 0

    CoverageMetric:
      type: object
      required: [totalFields, mappedFields, coverageRate]
      properties:
        totalFields:
          type: integer
          minimum: 0
        mappedFields:
          type: integer
          minimum: 0
        coverageRate:
          type: number
          minimum: 0
          maximum: 100
          description: 覆盖率百分比。
        passed:
          type: boolean

    CoverageThresholds:
      type: object
      required: [reviewSubmitOverall, publishOverall, publishP0Required]
      properties:
        reviewSubmitOverall:
          type: number
          default: 80
        publishOverall:
          type: number
          default: 85
        publishP0Required:
          type: number
          default: 95

    ValidationRuleSet:
      type: object
      required: [projectId, ruleSetVersion, rules, draftVersion]
      properties:
        projectId:
          type: string
        ruleSetVersion:
          type: integer
          minimum: 1
        rules:
          type: array
          items:
            $ref: '#/components/schemas/ValidationRule'
        updatedBy:
          $ref: '#/components/schemas/UserRef'
        updatedAt:
          type: string
          format: date-time
        draftVersion:
          type: integer
          minimum: 0

    ValidationRule:
      type: object
      required: [ruleCode, ruleName, category, enabled, severity]
      properties:
        ruleCode:
          type: string
          example: FIELD_COMMENT_REQUIRED
        ruleName:
          type: string
          example: 字段注释必填
        category:
          type: string
          enum: [naming, layer, type, comment, required_metadata, sensitive, classification, mapping]
        enabled:
          type: boolean
        severity:
          $ref: '#/components/schemas/IssueSeverity'
        configurable:
          type: boolean
          description: 是否允许项目内调整 blocker / warning 或启用状态。
        description:
          type: string

    UpdateValidationRuleSetRequest:
      allOf:
        - $ref: '#/components/schemas/DraftVersion'
        - type: object
          required: [rules]
          properties:
            rules:
              type: array
              minItems: 1
              items:
                type: object
                required: [ruleCode, enabled, severity]
                properties:
                  ruleCode:
                    type: string
                  enabled:
                    type: boolean
                  severity:
                    $ref: '#/components/schemas/IssueSeverity'

    StartValidationRequest:
      allOf:
        - $ref: '#/components/schemas/DraftVersion'
        - type: object
          properties:
            scope:
              type: string
              enum: [project, table, mapping, publish]
              default: project
            tableIds:
              type: array
              items:
                type: string

    ValidationRun:
      type: object
      required: [validationRunId, projectId, status, summary, issues, startedAt]
      properties:
        validationRunId:
          type: string
        projectId:
          type: string
        status:
          $ref: '#/components/schemas/TaskStatus'
        summary:
          $ref: '#/components/schemas/ValidationSummary'
        issues:
          type: array
          items:
            $ref: '#/components/schemas/ValidationIssue'
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time

    ValidationSummary:
      type: object
      required: [blockingIssueCount, warningIssueCount, checkedObjectCount]
      properties:
        blockingIssueCount:
          type: integer
          minimum: 0
        warningIssueCount:
          type: integer
          minimum: 0
        checkedObjectCount:
          type: integer
          minimum: 0
        passed:
          type: boolean

    ValidationIssue:
      type: object
      required: [issueId, severity, code, message, fieldPath]
      properties:
        issueId:
          type: string
        severity:
          $ref: '#/components/schemas/IssueSeverity'
        code:
          type: string
          example: FIELD_COMMENT_REQUIRED
        message:
          type: string
        suggestion:
          type: string
        objectType:
          type: string
          enum: [project, theme_domain, logical_entity, logical_field, physical_table, physical_field, mapping]
        objectId:
          type: string
        fieldPath:
          type: string
          example: logic.Product.returnRate

    FieldError:
      type: object
      required: [code, message, severity]
      properties:
        code:
          type: string
        message:
          type: string
        severity:
          $ref: '#/components/schemas/IssueSeverity'
        fieldPath:
          type: string
        rowNo:
          type: integer
          minimum: 1
        fieldName:
          type: string
        suggestion:
          type: string

    SubmitReviewRequest:
      allOf:
        - $ref: '#/components/schemas/DraftVersion'
        - type: object
          properties:
            submitNote:
              type: string
              maxLength: 1000
            validationRunId:
              type: string
            resubmissionOfReviewId:
              type: string
              description: 驳回后再次提交时可携带上一条 rejected reviewId；未携带时后端可按项目当前 rejected review 自动关联。

    ReviewSummary:
      type: object
      required: [reviewId, projectId, reviewStatus, submittedBy, submittedAt, reviewer, coverageSummary, actions]
      properties:
        reviewId:
          type: string
        projectId:
          type: string
        reviewStatus:
          $ref: '#/components/schemas/ReviewStatus'
        submittedBy:
          $ref: '#/components/schemas/UserRef'
        submittedAt:
          type: string
          format: date-time
        reviewer:
          $ref: '#/components/schemas/UserRef'
        previousReviewId:
          type: string
          description: 驳回后再次提交生成的新 reviewId，可通过该字段追溯上一条 rejected review。
        coverageSummary:
          $ref: '#/components/schemas/CoverageSummary'
        actions:
          type: array
          items:
            $ref: '#/components/schemas/ActionPermission'

    ReviewDetail:
      allOf:
        - $ref: '#/components/schemas/ReviewSummary'
        - type: object
          required: [diffItems, comments, validationRun]
          properties:
            diffItems:
              type: array
              items:
                $ref: '#/components/schemas/ReviewDiffItem'
            comments:
              type: array
              items:
                $ref: '#/components/schemas/ReviewComment'
            validationRun:
              $ref: '#/components/schemas/ValidationRun'
            reviewVersion:
              type: integer
              minimum: 0

    ReviewDiffItem:
      type: object
      required: [objectType, changeType, after]
      properties:
        objectType:
          type: string
          enum: [logical_field, physical_field, mapping, validation_issue]
        objectName:
          type: string
        changeType:
          type: string
          enum: [created, updated, deleted]
        before:
          type: object
          additionalProperties: true
        after:
          type: object
          additionalProperties: true
        impact:
          type: string

    ReviewComment:
      type: object
      required: [commentId, reviewId, content, createdBy, createdAt]
      properties:
        commentId:
          type: string
        reviewId:
          type: string
        content:
          type: string
        fieldPath:
          type: string
        createdBy:
          $ref: '#/components/schemas/UserRef'
        createdAt:
          type: string
          format: date-time

    AddReviewCommentRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 2000
        fieldPath:
          type: string

    ReviewDecisionRequest:
      type: object
      required: [decision, reviewVersion]
      properties:
        decision:
          type: string
          enum: [approve, reject]
        rejectionReason:
          type: string
          description: decision=reject 时必填。
          maxLength: 2000
        reviewVersion:
          type: integer
          minimum: 0

    ReviewDecisionResult:
      type: object
      required: [reviewId, reviewStatus, decidedBy, decidedAt]
      properties:
        reviewId:
          type: string
        reviewStatus:
          $ref: '#/components/schemas/ReviewStatus'
        decidedBy:
          $ref: '#/components/schemas/UserRef'
        decidedAt:
          type: string
          format: date-time
        rejectionReason:
          type: string

    PublishCheckRequest:
      allOf:
        - $ref: '#/components/schemas/DraftVersion'
        - type: object
          properties:
            reviewId:
              type: string

    PublishCheckResult:
      type: object
      required: [publishable, coverageSummary, blockingIssues, ddlDraftNotice, actions]
      properties:
        publishCheckId:
          type: string
        publishable:
          type: boolean
        coverageSummary:
          $ref: '#/components/schemas/CoverageSummary'
        blockingIssues:
          type: array
          items:
            $ref: '#/components/schemas/ValidationIssue'
        ddlDraftNotice:
          type: string
          example: PostgreSQL DDL 仅为草案，不会自动执行数据库迁移。
        actions:
          type: array
          items:
            $ref: '#/components/schemas/ActionPermission'

    CreateVersionRequest:
      allOf:
        - $ref: '#/components/schemas/DraftVersion'
        - type: object
          required: [publishNote, ddlDraftAcknowledged]
          properties:
            publishCheckId:
              type: string
            publishNote:
              type: string
              minLength: 1
              maxLength: 2000
            ddlDraftAcknowledged:
              type: boolean
              description: 用户确认 DDL 仅为草案，不自动执行。
              const: true

    PageResult_ModelVersionSummary:
      type: object
      required: [code, message, data, pageMeta]
      properties:
        code:
          type: string
          example: SUCCESS
        message:
          type: string
          example: 操作成功
        data:
          type: array
          items:
            $ref: '#/components/schemas/ModelVersionSummary'
        pageMeta:
          $ref: '#/components/schemas/PageMeta'
        traceId:
          type: string
        timestamp:
          type: string
          format: date-time

    ModelVersionSummary:
      type: object
      required: [versionId, projectId, versionNo, publishedBy, publishedAt, publishNote, coverageSummary, snapshotChecksum, actions]
      properties:
        versionId:
          type: string
        projectId:
          type: string
        versionNo:
          type: string
          example: v1
        publishedBy:
          $ref: '#/components/schemas/UserRef'
        publishedAt:
          type: string
          format: date-time
        publishNote:
          type: string
        coverageSummary:
          $ref: '#/components/schemas/CoverageSummary'
        snapshotChecksum:
          type: string
          description: 发布快照校验值，用于审计追溯、导出一致性和快照不可变校验。
        actions:
          type: array
          items:
            $ref: '#/components/schemas/ActionPermission'

    ModelVersionDetail:
      allOf:
        - $ref: '#/components/schemas/ModelVersionSummary'
        - type: object
          required: [snapshot, availableExportTypes, readonly]
          properties:
            snapshot:
              $ref: '#/components/schemas/VersionSnapshot'
            availableExportTypes:
              type: array
              items:
                $ref: '#/components/schemas/ExportType'
            readonly:
              type: boolean
              const: true

    CreateDraftFromVersionRequest:
      type: object
      required: [draftReason]
      properties:
        draftReason:
          type: string
          minLength: 1
          maxLength: 1000
        targetDraftName:
          type: string
          maxLength: 100

    DraftCreationResult:
      type: object
      required: [projectId, sourceVersionId, draftVersion, projectStatus, createdAt]
      properties:
        projectId:
          type: string
        sourceVersionId:
          type: string
        draftVersion:
          type: integer
          minimum: 0
        projectStatus:
          $ref: '#/components/schemas/ModelProjectStatus'
        createdBy:
          $ref: '#/components/schemas/UserRef'
        createdAt:
          type: string
          format: date-time

    VersionSnapshot:
      type: object
      required: [snapshotId, snapshotSchemaVersion, projectName, themeDomains, logicalFieldCount, physicalFieldCount, mappingCount]
      properties:
        snapshotId:
          type: string
        snapshotSchemaVersion:
          type: string
          description: 发布快照 payload 的结构版本，用于后续快照结构演进兼容。
          example: v1
        projectName:
          type: string
        themeDomains:
          type: array
          items:
            $ref: '#/components/schemas/ThemeDomain'
        logicalFieldCount:
          type: integer
          minimum: 0
        physicalFieldCount:
          type: integer
          minimum: 0
        mappingCount:
          type: integer
          minimum: 0
        ddlDraftNotice:
          type: string

    CreateExportRequest:
      type: object
      required: [exportType]
      properties:
        exportType:
          $ref: '#/components/schemas/ExportType'
        options:
          type: object
          properties:
            includeDiff:
              type: boolean
              default: true
            includeValidationIssues:
              type: boolean
              default: true
            includeMappingDetails:
              type: boolean
              default: true

    ExportTask:
      type: object
      required: [exportId, versionId, exportType, status, createdAt]
      properties:
        exportId:
          type: string
        versionId:
          type: string
        exportType:
          $ref: '#/components/schemas/ExportType'
        status:
          $ref: '#/components/schemas/ExportTaskStatus'
        fileName:
          type: string
        downloadUrl:
          type: string
          format: uri
          description: status=succeeded 且未过期时返回。
        expiresAt:
          type: string
          format: date-time
        createdBy:
          $ref: '#/components/schemas/UserRef'
        createdAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        failureReason:
          type: string
        originalExportId:
          type: string
          description: 重试任务对应的原始 exportId。

    RetryExportRequest:
      type: object
      properties:
        retryReason:
          type: string
          maxLength: 500
