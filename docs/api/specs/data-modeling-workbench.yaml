            codeTableCode:
              type: string
            standardFieldCode:
              type: string
            remark:
              type: string

    LogicalField:
      type: object
      required: [logicalFieldId, logicalEntityId, fieldCode, fieldName, p0Required, sensitiveFlag, classificationStatus]
