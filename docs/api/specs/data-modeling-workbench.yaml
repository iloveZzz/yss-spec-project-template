        logicalFieldId:
          type: string
        logicalEntityId:
          type: string
        fieldCode:
          type: string
        fieldName:
          type: string
        businessMeaning:
          type: string
        p0Required:
          type: boolean
        sensitiveFlag:
          type: boolean
        classificationStatus:
          $ref: '#/components/schemas/ClassificationStatus'
        codeTableCode:
          type: string
        standardFieldCode:
          type: string
        remark:
          type: string

    PhysicalTable:
