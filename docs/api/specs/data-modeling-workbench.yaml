info:
  title: 企业数据模型协作工作台 MVP
  version: 1.0.0-mvp-freeze
  description: |
    本 API 为企业数据模型协作工作台 MVP 的冻结版 OpenAPI 契约。

    契约覆盖模型项目、主题域、业务对象、逻辑字段、物理字段、Excel 导入、
    字段映射、覆盖率、规范检查、单一架构师评审、版本发布、异步导出、权限动作、
    错误结构、分页筛选排序和 draftVersion 乐观锁契约。

    本契约已通过 Design Review 复审并进入 OpenAPI Freeze。冻结后任何路径、
    schema、错误码、权限动作、幂等、分页、排序或乐观锁契约变更，都必须重新进入
    变更评审和契约测试更新。

    P0 安全边界：
    - 仅生成 PostgreSQL DDL 草案，不提供任何数据库连接或自动执行迁移端点。
    - P0 审批为单一数据架构师审批，不包含多级审批流。
    - 正式敏感分级体系后置，仅保留 sensitiveFlag 和 classificationStatus。
    - 认证、授权、DDL 草案和 SQL 文本落地前需要人工安全审查。
  contact:
    name: YSS Spec Team
    email: dev@example.com
  license:
    name: Internal Draft
    identifier: LicenseRef-Internal-Draft

servers:
  - url: /
    description: 当前部署域名

security:
  - bearerAuth: []

tags:
  - name: 模型项目
    description: 模型项目、主题域、子域、业务边界和负责人信息。
  - name: 模型对象
    description: 业务对象、逻辑实体、逻辑字段、物理表和物理字段。
  - name: Excel导入
    description: Excel 字段清单上传、预览、模板、别名、应用和取消。
  - name: 字段映射
    description: 逻辑字段到物理字段映射、覆盖率、未映射字段和批量保存。
  - name: 规范检查
    description: 命名、分层、类型、注释、敏感标记、待分级状态和映射完整性检查。
  - name: 模型评审
    description: 单一数据架构师评审、评论、通过、驳回和再次提交。
  - name: 版本发布
    description: 发布检查、发布快照、版本历史和只读版本详情。
  - name: 异步导出
    description: PostgreSQL DDL 草案、Markdown 模型文档和 Excel 字段清单异步导出。

paths:
  /api/v1/modeling/projects:
    get:
      tags: [模型项目]
      summary: 查询模型项目列表
      description: 查询企业数据模型协作工作台中的多个模型项目，支持分页、筛选、排序和动作权限返回。
      operationId: listModelProjects
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Keyword'
        - name: status
          in: query
          required: false
          description: 按模型项目状态筛选。
          schema:
            $ref: '#/components/schemas/ModelProjectStatus'
        - name: ownerId
          in: query
          required: false
          description: 按项目负责人筛选。
          schema:
            type: string
        - name: reviewStatus
          in: query
          required: false
          description: 按最近评审状态筛选。
          schema:
            $ref: '#/components/schemas/ReviewStatus'
        - name: coverageMin
          in: query
          required: false
          description: 整体覆盖率下限，单位为百分比。
          schema:
            type: number
            minimum: 0
            maximum: 100
        - name: coverageMax
          in: query
          required: false
          description: 整体覆盖率上限，单位为百分比。
          schema:
            type: number
            minimum: 0
            maximum: 100
        - name: sort
          in: query
          required: false
          description: 排序字段。默认 updatedAt。
          schema:
            type: string
            enum: [updatedAt, status, overallCoverage, p0Coverage, blockingIssueCount]
            default: updatedAt
        - $ref: '#/components/parameters/Direction'
      responses:
        '200':
          description: 查询成功。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResult_ModelProjectSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags: [模型项目]
      summary: 创建模型项目
      description: 创建模型项目及其首个主题域、子域、业务边界和负责人信息。
      operationId: createModelProject
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateModelProjectRequest'
            examples:
              绩效风控试点:
                value:
                  projectCode: PERF_RISK_METRIC_REUSE
                  projectName: 绩效风控指标模型复用
                  projectBoundary: 首批聚焦产品绩效收益模型 8 张表的逻辑模型、物理模型和字段映射闭环。
                  nonGoalBoundary: 不包含指标发布、调度编排、数据库直连采集和自动执行 DDL。
                  ownerId: user-1001
                  reviewerId: user-1002
                  themeDomain:
                    domainCode: PERF_RISK
                    domainName: 绩效风控
                    boundary: 聚焦绩效收益、资产类持仓收益和证券主数据相关模型。
                    ownerId: user-1003
                    subdomains:
                      - subdomainCode: PRODUCT_PERFORMANCE_RETURN
                        subdomainName: 产品绩效收益模型
                        boundary: 首批 8 张 P0 表。
                  pilotTables:
                    - tableCode: T_DWS_AS_PD_INFO_I
                      tableName: 每日产品净值收益表
                      tableType: 产品绩效事实
      responses:
        '201':
          description: 创建成功。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SingleResult'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ModelProjectDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/modeling/projects/{projectId}:
    get:
      tags: [模型项目]
      summary: 获取模型项目详情
      description: 返回项目边界、主题域、子域、首批表、负责人、评审人、覆盖率、状态、权限动作和 draftVersion。
