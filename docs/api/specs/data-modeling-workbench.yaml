        '200':
          description: 查询成功。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResult_ModelVersionSummary'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [版本发布]
      summary: 发布模型版本
      description: 发布已通过评审的模型草稿，生成不可变发布快照。只生成 DDL 草案资产，不自动执行任何数据库迁移。
      operationId: publishModelVersion
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVersionRequest'
      responses:
        '201':
          description: 发布成功。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SingleResult'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ModelVersionDetail'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/VersionConflict'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/modeling/versions/{versionId}:
    get:
      tags: [版本发布]
      summary: 获取发布版本详情
      description: 查询不可变发布快照、发布说明、覆盖率、diff 摘要、可导出资产和只读权限动作。
      operationId: getModelVersion
      parameters:
        - $ref: '#/components/parameters/VersionId'
      responses:
        '200':
          description: 查询成功。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SingleResult'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ModelVersionDetail'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/modeling/versions/{versionId}/drafts:
    post:
      tags: [版本发布]
      summary: 基于发布版本创建草稿变更
      description: 从不可变发布快照创建新的模型草稿，用于已发布版本只读后的继续修改。不会修改原发布版本。
      operationId: createDraftFromVersion
      parameters:
        - $ref: '#/components/parameters/VersionId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDraftFromVersionRequest'
      responses:
        '201':
          description: 草稿创建成功。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SingleResult'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DraftCreationResult'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/modeling/versions/{versionId}/exports:
    post:
      tags: [异步导出]
      summary: 创建异步导出任务
      description: 导出 PostgreSQL DDL 草案、Markdown 模型文档或 Excel 字段清单。导出任务属于发布版本，不修改模型草稿。
      operationId: createExportTask
      parameters:
        - $ref: '#/components/parameters/VersionId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExportRequest'
      responses:
        '202':
          description: 已创建导出任务。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SingleResult'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ExportTask'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/modeling/exports/{exportId}:
    get:
      tags: [异步导出]
      summary: 查询导出任务
      description: 返回导出任务 queued、running、succeeded、failed、expired 状态、下载地址、过期时间和失败原因。
      operationId: getExportTask
      parameters:
        - $ref: '#/components/parameters/ExportId'
      responses:
        '200':
          description: 查询成功。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SingleResult'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ExportTask'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/modeling/exports/{exportId}/retry:
    post:
      tags: [异步导出]
      summary: 重试导出任务
      description: 基于原导出参数创建新的 exportId，并保留原失败原因用于追溯。
      operationId: retryExportTask
      parameters:
        - $ref: '#/components/parameters/ExportId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetryExportRequest'
      responses:
        '202':
          description: 已创建新的导出任务。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SingleResult'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ExportTask'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ProjectId:
      name: projectId
      in: path
      required: true
      description: 模型项目 ID。
      schema:
        type: string
    BusinessObjectId:
      name: businessObjectId
      in: path
      required: true
      description: 业务对象 ID。
      schema:
        type: string
    LogicalEntityId:
      name: logicalEntityId
      in: path
      required: true
      description: 逻辑实体 ID。
      schema:
        type: string
    PhysicalTableId:
      name: physicalTableId
      in: path
      required: true
      description: 物理表 ID。
      schema:
        type: string
    LogicalFieldId:
      name: logicalFieldId
      in: path
      required: true
      description: 逻辑字段 ID。
      schema:
        type: string
    PhysicalFieldId:
      name: physicalFieldId
      in: path
      required: true
      description: 物理字段 ID。
      schema:
        type: string
    ImportId:
      name: importId
      in: path
      required: true
      description: 导入任务 ID。
      schema:
        type: string
    MappingId:
      name: mappingId
      in: path
      required: true
      description: 字段映射 ID。
      schema:
        type: string
    ValidationRunId:
      name: validationRunId
      in: path
      required: true
      description: 规范检查任务 ID。
      schema:
        type: string
    ReviewId:
      name: reviewId
      in: path
      required: true
      description: 评审 ID。
      schema:
        type: string
    VersionId:
      name: versionId
      in: path
      required: true
      description: 发布版本 ID。
      schema:
        type: string
    ExportId:
      name: exportId
      in: path
      required: true
      description: 导出任务 ID。
      schema:
        type: string
    Page:
      name: page
      in: query
      required: false
      description: 页码，从 1 开始。
      schema:
        type: integer
        minimum: 1
        default: 1
    Size:
      name: size
      in: query
      required: false
      description: 每页条数，默认 20，最大 100。
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Keyword:
      name: keyword
      in: query
      required: false
      description: 关键字，匹配模型项目、主题域、表名或字段名。
      schema:
        type: string
        maxLength: 100
    Direction:
      name: direction
      in: query
      required: false
      description: 排序方向。
      schema:
        type: string
        enum: [asc, desc]
        default: desc
    IdempotencyKey:
      name: X-Idempotency-Key
      in: header
      required: true
      description: 幂等键，用于 mutating command 的安全重试和防重复执行。
      schema:
        type: string
        maxLength: 128

  responses:
    BadRequest:
      description: 请求参数错误。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Unauthorized:
      description: 未认证。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Forbidden:
      description: 无权限或页面级权限不允许查看。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    NotFound:
      description: 资源不存在。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Conflict:
      description: 状态冲突。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    VersionConflict:
      description: draftVersion 乐观锁冲突。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          examples:
            draftVersionConflict:
              value:
                code: VERSION_CONFLICT
                message: 当前草稿已被其他用户更新，请刷新后重试。
                traceId: trace-001
                timestamp: 2026-07-02T10:00:00+08:00
                details:
                  currentDraftVersion: 18
                  submittedDraftVersion: 17
    ValidationError:
      description: 业务校验失败或门禁未通过。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
  schemas:
    SingleResult:
      type: object
      required: [code, message, data]
      properties:
        code:
          type: string
          description: 业务结果码，成功时为 SUCCESS。
          example: SUCCESS
        message:
          type: string
          example: 操作成功
        data:
          description: 响应数据。
        traceId:
          type: string
          description: 链路追踪 ID。
        timestamp:
          type: string
          format: date-time

    ApiError:
      type: object
      required: [code, message]
      properties:
        code:
          $ref: '#/components/schemas/ErrorCode'
        message:
          type: string
        traceId:
          type: string
        timestamp:
          type: string
          format: date-time
        fieldErrors:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'
        details:
          type: object
          additionalProperties: true

    ErrorCode:
      type: string
      enum:
        - BAD_REQUEST
        - UNAUTHORIZED
        - PERMISSION_DENIED
        - NOT_FOUND
        - PROJECT_BOUNDARY_INCOMPLETE
        - IMPORT_TEMPLATE_MISMATCH
        - IMPORT_COLUMN_ALIAS_UNSUPPORTED
        - IMPORT_DUPLICATE_FIELD
        - POSTGRES_TYPE_UNSUPPORTED
        - REVIEW_COVERAGE_BELOW_THRESHOLD
        - PUBLISH_COVERAGE_BELOW_THRESHOLD
        - P0_COVERAGE_BELOW_THRESHOLD
        - VALIDATION_BLOCKING_ISSUES
        - VERSION_CONFLICT
        - REVIEW_DECISION_CONFLICT
        - DDL_DRAFT_ACK_REQUIRED
        - EXPORT_TASK_FAILED
        - EXPORT_TASK_EXPIRED
        - INTERNAL_ERROR

    PageMeta:
      type: object
      required: [page, size, total, totalPages]
      properties:
        page:
          type: integer
          minimum: 1
        size:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 0

    DraftVersion:
      type: object
      required: [draftVersion]
      properties:
        draftVersion:
          type: integer
          minimum: 0
          description: 草稿版本号，用于乐观锁。
          example: 17

    UserRef:
      type: object
      required: [userId, userName]
      properties:
        userId:
          type: string
        userName:
          type: string
        orgName:
          type: string

    ActionPermission:
      type: object
      required: [actionKey, visible, enabled]
      properties:
        actionKey:
          type: string
          example: submitReview
        visible:
          type: boolean
          description: 是否展示入口型动作。
        enabled:
          type: boolean
          description: 展示后是否可点击。
        disabledReason:
          type: string
          description: 禁用原因。enabled=false 时必须返回。
          example: 整体映射覆盖率 78%，未达到提交评审门禁 80%。

    PermissionSet:
      type: object
      required: [canView, canEdit, canImport, canSubmitReview, canReview, canPublish, canExport]
      properties:
        canView:
          type: boolean
        canCreate:
          type: boolean
        canEdit:
          type: boolean
        canImport:
          type: boolean
        canSubmitReview:
          type: boolean
        canReview:
          type: boolean
        canPublish:
          type: boolean
        canExport:
          type: boolean

    ModelProjectStatus:
      type: string
      enum: [draft, importing, mapping, validating, review_pending, review_rejected, review_approved, published, archived]

    ReviewStatus:
      type: string
      enum: [none, pending, approved, rejected]

    IssueSeverity:
      type: string
      enum: [blocker, warning]

    MappingStatus:
      type: string
      enum: [mapped, unmapped, duplicated, suspected_mismatch]

    ImportStatus:
      type: string
      enum: [uploaded, parsing, preview_ready, applied, cancelled, failed]

    TaskStatus:
      type: string
      enum: [queued, running, succeeded, failed]

    ExportTaskStatus:
      type: string
      enum: [queued, running, succeeded, failed, expired]

    ExportType:
      type: string
      enum: [postgresql_sql, markdown, excel]

    ClassificationStatus:
      type: string
      description: P0 仅保留分级入口，正式分级体系后置。
      enum: [pending_classification, confirmed_non_sensitive, confirmed_sensitive]

    ObjectStatus:
      type: string
      enum: [active, archived]

    PageResult_ModelProjectSummary:
      type: object
      required: [code, message, data, pageMeta]
      properties:
        code:
          type: string
          example: SUCCESS
        message:
          type: string
          example: 操作成功
        data:
          type: array
          items:
            $ref: '#/components/schemas/ModelProjectSummary'
        pageMeta:
          $ref: '#/components/schemas/PageMeta'
        traceId:
          type: string
        timestamp:
          type: string
          format: date-time

    ModelProjectSummary:
      type: object
      required: [projectId, projectCode, projectName, status, owner, coverageSummary, updatedAt, actions]
      properties:
        projectId:
          type: string
        projectCode:
          type: string
        projectName:
          type: string
        themeDomainName:
          type: string
        firstSubdomainName:
          type: string
        status:
          $ref: '#/components/schemas/ModelProjectStatus'
        reviewStatus:
          $ref: '#/components/schemas/ReviewStatus'
        owner:
          $ref: '#/components/schemas/UserRef'
        reviewer:
          $ref: '#/components/schemas/UserRef'
        coverageSummary:
          $ref: '#/components/schemas/CoverageSummary'
        latestVersionNo:
          type: string
        blockingIssueCount:
          type: integer
          minimum: 0
        updatedAt:
          type: string
          format: date-time
        actions:
          type: array
          items:
            $ref: '#/components/schemas/ActionPermission'

    ModelProjectDetail:
      allOf:
        - $ref: '#/components/schemas/ModelProjectSummary'
        - type: object
          required: [projectBoundary, nonGoalBoundary, themeDomains, pilotTables, permissions, draftVersion]
          properties:
            projectBoundary:
              type: string
            nonGoalBoundary:
              type: string
            currentStage:
              type: string
              example: 字段映射
            completeness:
              $ref: '#/components/schemas/ProjectCompleteness'
            themeDomains:
              type: array
              items:
                $ref: '#/components/schemas/ThemeDomain'
            pilotTables:
              type: array
              items:
                $ref: '#/components/schemas/PilotTable'
            permissions:
              $ref: '#/components/schemas/PermissionSet'
            draftVersion:
              type: integer
              minimum: 0

    ProjectCompleteness:
      type: object
      required: [complete, missingItems]
      properties:
        complete:
          type: boolean
        missingItems:
          type: array
          items:
            type: string
          example: [主题域边界, 评审人]

    ArchiveModelProjectRequest:
      allOf:
        - $ref: '#/components/schemas/DraftVersion'
        - type: object
          required: [archiveReason]
          properties:
            archiveReason:
              type: string
              minLength: 1
              maxLength: 1000

    CreateModelProjectRequest:
      type: object
      required: [projectCode, projectName, projectBoundary, ownerId, reviewerId, themeDomain]
      properties:
        projectCode:
          type: string
          maxLength: 64
        projectName:
          type: string
          maxLength: 100
        projectBoundary:
          type: string
          maxLength: 2000
        nonGoalBoundary:
          type: string
          maxLength: 2000
        ownerId:
          type: string
        reviewerId:
          type: string
        themeDomain:
          $ref: '#/components/schemas/CreateThemeDomainRequest'
        pilotTables:
          type: array
          items:
            $ref: '#/components/schemas/PilotTableInput'

    UpdateModelProjectRequest:
      allOf:
        - $ref: '#/components/schemas/DraftVersion'
        - type: object
          properties:
            projectName:
              type: string
              maxLength: 100
            projectBoundary:
              type: string
              maxLength: 2000
            nonGoalBoundary:
              type: string
              maxLength: 2000
            ownerId:
              type: string
            reviewerId:
              type: string
            themeDomains:
              type: array
              items:
                $ref: '#/components/schemas/ThemeDomainInput'
            pilotTables:
              type: array
              items:
                $ref: '#/components/schemas/PilotTableInput'

    CreateThemeDomainRequest:
      type: object
      required: [domainCode, domainName, boundary, ownerId, subdomains]
      properties:
        domainCode:
          type: string
        domainName:
          type: string
        boundary:
          type: string
        ownerId:
          type: string
        subdomains:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/SubdomainInput'

    ThemeDomainInput:
      allOf:
        - $ref: '#/components/schemas/CreateThemeDomainRequest'
        - type: object
          properties:
            themeDomainId:
              type: string

    SubdomainInput:
      type: object
      required: [subdomainCode, subdomainName, boundary]
      properties:
        subdomainId:
          type: string
        subdomainCode:
          type: string
        subdomainName:
          type: string
        boundary:
          type: string

    ThemeDomain:
      type: object
      required: [themeDomainId, domainCode, domainName, boundary, owner, subdomains]
      properties:
        themeDomainId:
          type: string
        domainCode:
          type: string
        domainName:
          type: string
        boundary:
          type: string
        owner:
          $ref: '#/components/schemas/UserRef'
        subdomains:
          type: array
          items:
            $ref: '#/components/schemas/Subdomain'

    Subdomain:
      type: object
      required: [subdomainId, subdomainCode, subdomainName, boundary]
      properties:
        subdomainId:
          type: string
        subdomainCode:
          type: string
        subdomainName:
          type: string
        boundary:
          type: string

    PilotTableInput:
      type: object
      required: [tableCode, tableName, tableType]
      properties:
        tableCode:
          type: string
        tableName:
          type: string
        tableType:
          type: string

    PilotTable:
      allOf:
        - $ref: '#/components/schemas/PilotTableInput'
        - type: object
          required: [tableId, importStatus]
          properties:
            tableId:
              type: string
            importStatus:
              type: string
              enum: [not_imported, imported]
            coverageRate:
              type: number
              minimum: 0
              maximum: 100
            validationStatus:
              type: string
              enum: [not_run, passed, warning, blocker]

    ModelObjectTree:
      type: object
      required: [projectId, themeDomains]
      properties:
        projectId:
          type: string
        themeDomains:
          type: array
          items:
            $ref: '#/components/schemas/ThemeDomainTreeNode'

    ThemeDomainTreeNode:
      type: object
      required: [themeDomainId, domainName, subdomains]
      properties:
        themeDomainId:
          type: string
        domainName:
          type: string
        subdomains:
          type: array
          items:
            $ref: '#/components/schemas/SubdomainTreeNode'

    SubdomainTreeNode:
      type: object
      required: [subdomainId, subdomainName, businessObjects]
      properties:
        subdomainId:
          type: string
        subdomainName:
          type: string
        businessObjects:
          type: array
          items:
            $ref: '#/components/schemas/BusinessObjectTreeNode'

    BusinessObjectTreeNode:
      type: object
      required: [businessObjectId, businessObjectName, logicalEntities, counts]
      properties:
        businessObjectId:
          type: string
        businessObjectName:
          type: string
        logicalEntities:
          type: array
          items:
            $ref: '#/components/schemas/LogicalEntityTreeNode'
        counts:
          $ref: '#/components/schemas/ObjectTreeCounts'

    BusinessObject:
      type: object
      required: [businessObjectId, projectId, subdomainId, objectCode, objectName, status, draftVersion]
      properties:
        businessObjectId:
          type: string
        projectId:
          type: string
        themeDomainId:
          type: string
        subdomainId:
          type: string
        objectCode:
          type: string
        objectName:
          type: string
        description:
          type: string
        status:
          $ref: '#/components/schemas/ObjectStatus'
        draftVersion:
          type: integer
          minimum: 0

    CreateBusinessObjectRequest:
      allOf:
        - $ref: '#/components/schemas/DraftVersion'
        - type: object
          required: [themeDomainId, subdomainId, objectCode, objectName]
          properties:
            themeDomainId:
              type: string
            subdomainId:
              type: string
            objectCode:
              type: string
              maxLength: 64
            objectName:
              type: string
              maxLength: 100
            description:
              type: string
              maxLength: 1000

    UpdateBusinessObjectRequest:
      allOf:
        - $ref: '#/components/schemas/DraftVersion'
        - type: object
          properties:
            objectCode:
              type: string
              maxLength: 64
            objectName:
              type: string
              maxLength: 100
            description:
              type: string
              maxLength: 1000

    ArchiveObjectRequest:
      allOf:
        - $ref: '#/components/schemas/DraftVersion'
        - type: object
          required: [archiveReason]
          properties:
            archiveReason:
              type: string
              minLength: 1
              maxLength: 1000

    LogicalEntityTreeNode:
      type: object
      required: [logicalEntityId, logicalEntityName, logicalFieldCount]
      properties:
        logicalEntityId:
          type: string
        logicalEntityName:
          type: string
        logicalFieldCount:
          type: integer
          minimum: 0

    LogicalEntity:
      type: object
